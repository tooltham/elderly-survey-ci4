version: '3.8'

services:
  app:
    build: .
    container_name: elderly-survey-app
    ports:
      - "3001:80"
    volumes:
      - .:/var/www/html
    environment:
      - CI_ENVIRONMENT=development
    networks:
      - production-network
    depends_on:
      - db

  db:
    image: mariadb:11
    container_name: elderly-survey-db
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-root_password}
      MYSQL_DATABASE: ${MYSQL_DATABASE:-elderly_survey}
      MYSQL_USER: ${MYSQL_USER:-user}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD:-password}
    ports:
      - "3307:3306"
    volumes:
      - elderly-survey-db-data:/var/lib/mysql
    networks:
      - production-network

networks:
  production-network:
    external: true

volumes:
  elderly-survey-db-data:
